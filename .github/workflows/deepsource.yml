name: DeepSource Code Review

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deepsource-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter Analyzer
        run: flutter analyze > analyzer-output.txt || true

      - name: Convert to SARIF
        uses: advanced-security/dart-analyzer-sarif@v1
        with:
          input: analyzer-output.txt
          output: dart-results.sarif

      - name: Report to DeepSource
        run: |
          curl https://deepsource.io/cli | sh
          ./bin/deepsource report --analyzer dart-analyze --analyzer-type community --value-file dart-results.sarif || true
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
